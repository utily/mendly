name: "Bump Beta"

on:
  push:
    branches:
      - "master"

concurrency:
  group: bump-beta-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  bump-beta:
    uses: ./.github/workflows/bump-common.yml
    with:
      bump_name: "Bump Beta"
      default_bump: "prerelease"
      preid: "beta"
      rc_wording: ""
      tag_prefix: "prerelease-"
