name: "Publish Prerelease"

on:
  push:
    tags:
      - "prerelease-*"

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    uses: ./.github/workflows/publish-common.yml
    with:
      tag: ${{ contains(github.ref_name, '-alpha.') && 'alpha' || 'beta' }}
    secrets: inherit
