name: Bump
permissions:
  contents: write
on:
  workflow_run:
    workflows:
      - Publish
    types:
      - completed
jobs:
  bump:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: Bump version after publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Resolve bump command
        id: bump-command
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const ref = context.payload.workflow_run?.head_branch || process.env.GITHUB_REF_NAME || "";
            const type = ref == "master" ? "beta" : ref == "master-4" ? "alpha" : "minor";
            return `npm version ${type == "minor" ? "minor" : "prerelease"} ${type != "minor" ? "--preid=" + type : ""}`;
      - name: Bump version
        run: ${{ steps.bump-command.outputs.result }}
      - name: Push bumped version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add package.json package-lock.json
          git commit -m "chore: bump version after publish"
          git push origin HEAD
          git push --tags
