name: Publish
permissions:
  contents: read
  id-token: write
on:
  push:
    branches:
      - master
      - master-4
      - master-1
      - master-2
jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: npm ci
      - name: Build package
        run: npm run build
      - name: Publish beta
        if: github.ref_name == 'master'
        run: npm publish --access public --provenance --tag beta
      - name: Publish alpha
        if: github.ref_name == 'master-4'
        run: npm publish --access public --provenance --tag alpha
      - name: Publish latest
        if: github.ref_name != 'master' && github.ref_name != 'master-4'
        run: npm publish --access public --provenance --tag latest
