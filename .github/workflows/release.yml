name: "Release"

on:
  push:
    branches:
      - "master"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-master
  cancel-in-progress: false

jobs:
  release:
    name: "Release"
    timeout-minutes: 60
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'ci: version bump to v')"

    steps:
      - name: "Checkout source code"
        uses: "actions/checkout@v4"
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: "Setup Node"
        uses: "actions/setup-node@v4"
        with:
          node-version: 22
          cache: "npm"

      - name: "Determine bump type"
        id: bump-type
        run: |
          message='${{ github.event.head_commit.message }}'
          normalized=$(printf '%s' "$message" | tr '[:upper:]' '[:lower:]')

          if [[ "$normalized" == *"no-release"* ]]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "bump=none" >> "$GITHUB_OUTPUT"
          elif [[ "$normalized" == *"breaking"* ]]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "bump=major" >> "$GITHUB_OUTPUT"
          elif [[ "$normalized" == *"feature"* ]]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          elif [[ "$normalized" == *"fix"* ]]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          fi

      - name: "No release marker"
        if: steps.bump-type.outputs.release == 'false'
        run: echo "Skipping release because commit message contains no-release"

      - name: "Release idempotency guard"
        if: steps.bump-type.outputs.release == 'true'
        id: release-guard
        run: |
          version=$(node -p "require('./package.json').version")
          bump="${{ steps.bump-type.outputs.bump }}"
          next=$(node -e 'const version=process.argv[1];const bump=process.argv[2];const parts=version.split(".").map((v)=>Number.parseInt(v,10));if(parts.length!==3||parts.some(Number.isNaN)){throw new Error(`Invalid semver version: ${version}`);}let [major,minor,patch]=parts;if(bump==="major"){major+=1;minor=0;patch=0;}else if(bump==="minor"){minor+=1;patch=0;}else if(bump==="patch"){patch+=1;}else{throw new Error(`Unsupported bump type: ${bump}`);}process.stdout.write(`${major}.${minor}.${patch}`);' "$version" "$bump")
          tag="v${next}"

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

          if git ls-remote --tags --exit-code origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "Skipping release because ${tag} already exists on origin"
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: "No release marker (already released)"
        if: steps.bump-type.outputs.release == 'true' && steps.release-guard.outputs.release == 'false'
        run: echo "Skipping release because tag already exists"

      - name: "Bump package version"
        if: steps.bump-type.outputs.release == 'true' && steps.release-guard.outputs.release == 'true'
        run: npm version "${{ steps.bump-type.outputs.bump }}" --no-git-tag-version

      - name: "Commit and tag"
        if: steps.bump-type.outputs.release == 'true' && steps.release-guard.outputs.release == 'true'
        id: version
        run: |
          version=$(node -p "require('./package.json').version")
          tag="${{ steps.release-guard.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json package-lock.json
          git commit -m "ci: version bump to ${tag} [skip ci]"
          git tag "${tag}"

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: "Verify tag/version match"
        if: steps.bump-type.outputs.release == 'true' && steps.release-guard.outputs.release == 'true'
        run: |
          version=$(node -p "require('./package.json').version")
          tag="${{ steps.version.outputs.tag }}"
          if [[ "$tag" != "v${version}" ]]; then
            echo "Tag and package version mismatch"
            exit 1
          fi

      - name: "Publish"
        if: steps.bump-type.outputs.release == 'true' && steps.release-guard.outputs.release == 'true'
        run: |
          git rev-parse --verify "${{ steps.version.outputs.tag }}" >/dev/null
          npm publish --access public --provenance

      - name: "Push commit and tag"
        if: steps.bump-type.outputs.release == 'true' && steps.release-guard.outputs.release == 'true'
        run: |
          git push origin HEAD:master
          git push origin "${{ steps.version.outputs.tag }}"
